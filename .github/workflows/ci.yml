name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  golangci-lint:
    name: GolangCI-Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install Tailwind CSS
        run: |
          mkdir -p bin
          curl -sL https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64 -o bin/tailwindcss
          chmod +x bin/tailwindcss
      - name: Build CSS
        run: make tailwind
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: Lint
        run: golangci-lint run ./...

  gofmt:
    name: Go Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Check Go formatting
        run: |
          if [ -n "$(gofmt -s -l .)" ]; then
            echo "Go code is not formatted. Please run 'gofmt -s -w .'"
            gofmt -s -d .
            exit 1
          fi

  go-mod-tidy:
    name: Go Modules Tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Check if go.mod/go.sum are tidy
        run: |
          go mod tidy
          if [ -n "$(git diff --name-only -- go.mod go.sum)" ]; then
            echo "go.mod/go.sum are not tidy. Please run 'go mod tidy'"
            git diff -- go.mod go.sum
            exit 1
          fi

  vet:
    name: Go Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install Tailwind CSS
        run: |
          mkdir -p bin
          curl -sL https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64 -o bin/tailwindcss
          chmod +x bin/tailwindcss
      - name: Build CSS
        run: make tailwind
      - name: Vet
        run: go vet ./...

  test:
    name: Go Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install Tailwind CSS
        run: |
          mkdir -p bin
          curl -sL https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64 -o bin/tailwindcss
          chmod +x bin/tailwindcss
      - name: Build CSS
        run: make tailwind
      - name: Test
        run: go test -v ./...
